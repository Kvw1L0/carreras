<!DOCTYPE html>
<html lang="es">
<head>
    <title>Jungle - Mando</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <style>
        :root { --jungle-yellow: #FFE600; --jungle-black: #111111; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Arial Black', sans-serif; background: var(--jungle-black); color: var(--jungle-yellow); overflow: hidden; touch-action: none; }
        .pantalla { display: none; width: 100%; height: 100%; flex-direction: column; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; position: absolute; top: 0; left: 0; }
        .activa { display: flex; animation: aparecer 0.3s ease-in; }
        h2 { text-align: center; margin-bottom: 20px; font-size: 28px; text-transform: uppercase; text-shadow: 2px 2px 0px #000; letter-spacing: 2px; }
        input { padding: 15px; font-size: 20px; border: 4px solid var(--jungle-yellow); width: 80%; text-align: center; font-weight: bold; margin-bottom: 20px; outline: none; background: #000; color: #fff; text-transform: uppercase; }
        .btn-accion { padding: 15px 40px; font-size: 22px; border: none; background: var(--jungle-yellow); color: var(--jungle-black); font-weight: bold; cursor: pointer; width: 80%; text-transform: uppercase; box-shadow: 4px 4px 0px #fff; }
        .grid { display: grid; grid-template-columns: 1fr; gap: 15px; width: 100%; max-width: 300px; }
        .btn-equipo { padding: 25px; font-size: 20px; border: 4px solid #fff; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; background: #FF3B30; text-transform: uppercase; font-family: 'Arial Black'; }
        #popup-instrucciones { background: var(--jungle-black); z-index: 50; text-align: center; padding: 30px; border: 8px solid var(--jungle-yellow); }
        #zona-tap { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; position: relative; border: 10px solid var(--jungle-yellow); box-sizing: border-box; background: #FF3B30; }
        #mensaje-tap { font-size: 40px; font-weight: bold; text-align: center; color: white; text-shadow: 2px 2px 0 #000; text-transform: uppercase; pointer-events: none; }
        .flotante { position: absolute; color: var(--jungle-yellow); font-weight: bold; pointer-events: none; animation: subir 0.4s ease-out forwards; text-shadow: 2px 2px 0 #000; }
        @keyframes subir { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-100px); } }
        .victoria { animation: flash 0.2s infinite linear; }
        @keyframes flash { 0% { background: var(--jungle-yellow); } 50% { background: #fff; } 100% { background: var(--jungle-yellow); } }
    </style>
</head>
<body>

    <div id="pantalla-nombre" class="pantalla activa">
        <h2>Ingresa tu nombre</h2>
        <input type="text" id="input-nombre" placeholder="TU NOMBRE..." maxlength="12">
        <button class="btn-accion" onclick="guardarNombre()">CONTINUAR</button>
    </div>

    <div id="pantalla-seleccion" class="pantalla">
        <h2>ELIGE TU EQUIPO</h2>
        <div class="grid" id="lista-equipos"></div>
    </div>

    <div id="popup-instrucciones" class="pantalla">
        <h1 style="color: var(--jungle-yellow); font-size: 30px;">PREPARADOS</h1>
        <p style="color: #fff; font-size: 18px;">PRESIONA LA PANTALLA RÁPIDAMENTE.<br>SOLO CUENTA UN DEDO A LA VEZ.</p>
        <div id="contador-gigante" style="font-size: 80px; color: var(--jungle-yellow);">3</div>
    </div>

    <div id="pantalla-juego" class="pantalla" style="padding: 0;">
        <div id="zona-tap">
            <div id="mensaje-tap">¡PRESIONA<br>RÁPIDO!</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, update, set, increment, onDisconnect, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAlvRSjQ8HMkYLqWdRnz8sHm6H1anXxNUw",
            authDomain: "hipodromo-56215.firebaseapp.com",
            databaseURL: "https://hipodromo-56215-default-rtdb.firebaseio.com",
            projectId: "hipodromo-56215",
            storageBucket: "hipodromo-56215.firebasestorage.app",
            messagingSenderId: "793993929295",
            appId: "1:793993929295:web:febbad383d625d60c3c03a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const EQUIPOS = ["DELIVER", "DEVELOP", "TRANSFORM"];
        const miID = Math.random().toString(36).substring(2, 10);
        let miNombre = "", miEquipo = null, estadoJuego = 'espera';

        window.guardarNombre = () => {
            const val = document.getElementById('input-nombre').value.trim();
            if(val) { miNombre = val.toUpperCase(); document.getElementById('pantalla-nombre').classList.remove('activa'); document.getElementById('pantalla-seleccion').classList.add('activa'); }
        };

        EQUIPOS.forEach((nombre, i) => {
            const b = document.createElement('button');
            b.className = 'btn-equipo';
            b.innerText = `🚴 ${nombre}`;
            b.onclick = () => unirse(i + 1);
            document.getElementById('lista-equipos').appendChild(b);
        });

        function unirse(id) {
            miEquipo = id;
            set(ref(db, `equipos/${id}/jugadores/${miID}`), miNombre);
            onDisconnect(ref(db, `equipos/${id}/jugadores/${miID}`)).remove();
            document.getElementById('pantalla-seleccion').classList.remove('activa');
            document.getElementById('popup-instrucciones').classList.add('activa');
            iniciarMecanicas(id);
        }

        function iniciarMecanicas(id) {
            onValue(ref(db, 'estado'), (snap) => {
                estadoJuego = snap.val();
                if(estadoJuego === 'cuenta_regresiva') {
                    let c = 3; const el = document.getElementById('contador-gigante');
                    const int = setInterval(() => { c--; if(c>0) el.innerText = c; else clearInterval(int); }, 1000);
                }
                if(estadoJuego === 'carrera') {
                    document.getElementById('popup-instrucciones').classList.remove('activa');
                    document.getElementById('pantalla-juego').classList.add('activa');
                }
            });

            onValue(ref(db, 'ganadorAbsoluto'), (snap) => {
                if(snap.val() === miEquipo) {
                    document.getElementById('zona-tap').classList.add('victoria');
                    document.getElementById('mensaje-tap').innerText = "¡GANAMOS! 🏆";
                } else if(snap.val()) {
                    document.getElementById('zona-tap').style.filter = "grayscale(100%)";
                    document.getElementById('mensaje-tap').innerText = "FIN";
                }
            });

            // LÓGICA DE UN SOLO DEDO
            document.getElementById('zona-tap').addEventListener('touchstart', (e) => {
                e.preventDefault();
                if(estadoJuego !== 'carrera') return;
                
                // Si hay más de un toque activo, ignoramos para forzar un solo dedo
                if (e.touches.length > 1) return;

                update(ref(db, `equipos/${id}`), { clicksTotales: increment(1) });
                
                const t = e.touches[0];
                const n = document.createElement('div');
                n.className = 'flotante'; n.innerText = '+1';
                n.style.left = t.clientX + 'px'; n.style.top = t.clientY + 'px';
                document.getElementById('zona-tap').appendChild(n);
                setTimeout(() => n.remove(), 400);
            });
        }
    </script>
</body>
</html>
