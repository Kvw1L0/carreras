<!DOCTYPE html>
<html lang="es">
<head>
    <title>Jungle TV - Carrera</title>
    <style>
        :root { --jungle-yellow: #FFE600; --jungle-black: #111111; }
        body { background: var(--jungle-black); color: var(--jungle-yellow); font-family: 'Arial Black', sans-serif; margin: 0; overflow: hidden; }
        #pista { width: 100vw; height: 100vh; position: relative; background: #1a1a1a; transition: transform 0.8s cubic-bezier(0.25, 0.1, 0.25, 1); border-top: 5px solid var(--jungle-yellow); }
        .carril { height: 33vh; border-bottom: 4px dashed rgba(255, 230, 0, 0.3); position: relative; display: flex; align-items: center; }
        .bicicleta { position: absolute; left: 0; font-size: 15vh; transition: left 0.1s linear; z-index: 2; filter: drop-shadow(0 0 10px #FF3B30); }
        .info { position: absolute; left: 20px; z-index: 10; font-size: 5vh; text-transform: uppercase; color: var(--jungle-yellow); text-shadow: 4px 4px 0 #000; }
        .meta { position: absolute; right: 5%; top: 0; bottom: 0; width: 40px; background: repeating-linear-gradient(0deg, var(--jungle-black), var(--jungle-black) 20px, var(--jungle-yellow) 20px, var(--jungle-yellow) 40px); border-left: 5px solid #fff; }
        .overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); display:none; flex-direction:column; justify-content:center; align-items:center; z-index:100; text-align: center; }
        .btn-iniciar { padding: 30px 60px; font-size: 5vh; background: var(--jungle-yellow); color: #000; border: none; font-weight: bold; cursor: pointer; box-shadow: 8px 8px 0 #fff; }
        #contador-tv { font-size: 40vh; color: var(--jungle-yellow); text-shadow: 10px 10px 0 #000; display: none; }
        .puesto { font-size: 6vh; background: #000; border: 5px solid var(--jungle-yellow); padding: 20px; margin: 10px; width: 70%; display: flex; justify-content: space-between; }
    </style>
</head>
<body>
    <div id="pista">
        <div class="meta"></div>
    </div>

    <div id="overlay-inicio" class="overlay" style="display: flex;">
        <h1 style="font-size: 12vh; margin:0;">BIKE CHALLENGE</h1>
        <button class="btn-iniciar" onclick="iniciarSecuencia()">EMPEZAR</button>
        <div id="contador-tv">3</div>
    </div>

    <div id="overlay-podio" class="overlay">
        <h1 style="font-size: 8vh;">RESULTADOS</h1>
        <div id="lista-podio" style="width: 100%; display: flex; flex-direction: column; align-items: center;"></div>
        <button class="btn-iniciar" onclick="location.reload()" style="font-size: 3vh;">REPETIR</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAlvRSjQ8HMkYLqWdRnz8sHm6H1anXxNUw",
            authDomain: "hipodromo-56215.firebaseapp.com",
            databaseURL: "https://hipodromo-56215-default-rtdb.firebaseio.com",
            projectId: "hipodromo-56215",
            storageBucket: "hipodromo-56215.firebasestorage.app",
            messagingSenderId: "793993929295",
            appId: "1:793993929295:web:febbad383d625d60c3c03a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const EQUIPOS = ["DELIVER", "DEVELOP", "TRANSFORM"];
        let datosEq = {}, anteriorClicks = {}, posiciones = {}, juegoActivo = false, clasificacion = [];
        let factorVel = 1, enTension = false;

        function resetDB() {
            set(ref(db, 'estado'), 'espera');
            set(ref(db, 'ganadorAbsoluto'), null);
            const ini = {};
            EQUIPOS.forEach((_, i) => { ini[i+1] = { clicksTotales: 0 }; posiciones[i+1] = 0; anteriorClicks[i+1] = 0; });
            set(ref(db, 'equipos'), ini);
        }
        resetDB();

        onValue(ref(db, 'equipos'), (snap) => { datosEq = snap.val() || {}; });

        const pista = document.getElementById('pista');
        EQUIPOS.forEach((nom, i) => {
            const c = document.createElement('div');
            c.className = 'carril';
            c.innerHTML = `<div class="info">${nom}</div><div class="bicicleta" id="b-${i+1}">🚴</div>`;
            pista.appendChild(c);
        });

        window.iniciarSecuencia = () => {
            document.querySelector('#overlay-inicio h1').style.display = 'none';
            document.querySelector('.btn-iniciar').style.display = 'none';
            const tv = document.getElementById('contador-tv'); tv.style.display = 'block';
            set(ref(db, 'estado'), 'cuenta_regresiva');
            let num = 3;
            const int = setInterval(() => {
                num--; if(num>0) tv.innerText = num;
                else { clearInterval(int); tv.innerText = "¡GO!"; setTimeout(() => { 
                    document.getElementById('overlay-inicio').style.display = 'none';
                    set(ref(db, 'estado'), 'carrera'); juegoActivo = true; 
                }, 500); }
            }, 1000);
        };

        setInterval(() => {
            if(!juegoActivo) return;
            EQUIPOS.forEach((_, i) => {
                const id = i + 1;
                if(clasificacion.includes(id)) return;
                const data = datosEq[id];
                const jgs = data.jugadores ? Object.keys(data.jugadores).length : 0;
                if(jgs > 0) {
                    const diff = data.clicksTotales - anteriorClicks[id];
                    posiciones[id] += (diff / jgs) * 5 * factorVel;
                    anteriorClicks[id] = data.clicksTotales;
                    
                    const el = document.getElementById(`b-${id}`);
                    // 90% es el punto donde la bicicleta TOCARÍA la línea de meta (95vw)
                    const visual = (posiciones[id] / 1000) * 90;
                    el.style.left = Math.min(visual, 92) + "vw";

                    // Tensión: Al estar cerca de TOCAR (85% de la pista)
                    if(visual >= 83 && !enTension) {
                        enTension = true; factorVel = 0.1;
                        pista.style.transformOrigin = `95vw ${(id * 33) - 16}vh`;
                        pista.style.transform = "scale(2.5) translateX(-5vw)";
                        document.body.style.filter = "saturate(2) contrast(1.2)";
                    }

                    // Victoria: Al TOCAR la línea (90% de la pista interna)
                    if(visual >= 90) {
                        clasificacion.push(id);
                        el.innerText = "🚩";
                        if(clasificacion.length === 1) set(ref(db, 'ganadorAbsoluto'), id);
                        
                        // Volver a la normalidad tras tocar
                        pista.style.transform = "scale(1) translateX(0)";
                        document.body.style.filter = "none";
                        factorVel = 1; enTension = false;

                        if(clasificacion.length >= Math.min(3, EQUIPOS.length)) {
                            juegoActivo = false; setTimeout(() => mostrarPodio(), 1000);
                        }
                    }
                }
            });
        }, 100);

        function mostrarPodio() {
            set(ref(db, 'estado'), 'espera');
            const lista = document.getElementById('lista-podio');
            clasificacion.forEach((id, idx) => {
                const item = document.createElement('div');
                item.className = 'puesto';
                item.innerHTML = `<span>#${idx+1}</span> <span>${EQUIPOS[id-1]}</span>`;
                lista.appendChild(item);
            });
            document.getElementById('overlay-podio').style.display = 'flex';
        }
    </script>
</body>
</html>
