<!DOCTYPE html>
<html lang="es">
<head>
    <title>TV Carrera Épica</title>
    <style>
        body { background: #111; color: white; font-family: 'Arial Black', sans-serif; margin: 0; overflow: hidden; transition: filter 1s ease-out; }
        
        #pista { width: 100vw; height: 100vh; position: relative; background: #2f3542; transition: transform 1s cubic-bezier(0.25, 0.1, 0.25, 1); will-change: transform; }
        
        .carril { height: 10vh; border-bottom: 2px dashed rgba(255,255,255,0.1); position: relative; display: flex; align-items: center; }
        
        .caballo { position: absolute; left: 0; font-size: 6vh; transition: left 0.1s linear; z-index: 2; }
        .info { position: absolute; left: 10px; z-index: 10; display: flex; flex-direction: column; justify-content: center; }
        .titulo-eq { font-size: 2vh; color: #fff; text-shadow: 1px 1px 2px black; }
        .nombres-jugadores { font-size: 1.2vh; color: #aaa; max-width: 15vw; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-family: sans-serif; font-weight: normal; }
        
        .meta { position: absolute; right: 5%; top: 0; bottom: 0; width: 15px; background: repeating-linear-gradient(45deg, #000, #000 15px, #fff 15px, #fff 30px); }

        .efecto-tension { filter: saturate(2) contrast(1.5) brightness(0.6); }

        .overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); display:none; flex-direction:column; justify-content:center; align-items:center; z-index:100; text-align: center; }
        #titulo-podio { font-size: 8vh; color: gold; text-shadow: 0 0 20px rgba(255,215,0,0.5); margin-bottom: 20px; }
        .puesto { font-size: 5vh; margin: 10px; padding: 15px 40px; border-radius: 10px; background: #333; width: 50%; display: flex; justify-content: space-between; }
        .oro { border: 4px solid gold; color: gold; transform: scale(1.1); box-shadow: 0 0 30px gold; }
        .plata { border: 4px solid silver; color: silver; }
        .bronce { border: 4px solid #cd7f32; color: #cd7f32; }
        
        .btn-iniciar { padding: 20px 50px; font-size: 3vh; background: #2ed573; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 30px; }
    </style>
</head>
<body>
    <div id="pista">
        <div class="meta"></div>
    </div>

    <div id="overlay-inicio" class="overlay" style="display: flex;">
        <h1 style="font-size: 10vh; margin:0;">🏁 PREPARADOS 🏁</h1>
        <p style="font-size: 3vh; color: #ccc;">Ingresen su nombre y elijan un equipo en su celular</p>
        <button class="btn-iniciar" onclick="iniciarCarrera()">¡INICIAR CARRERA!</button>
    </div>

    <div id="overlay-podio" class="overlay">
        <div id="titulo-podio">🏆 RESULTADOS 🏆</div>
        <div id="lista-podio" style="width: 100%; display: flex; flex-direction: column; align-items: center;"></div>
        <button class="btn-iniciar" onclick="location.reload()" style="background: #ff4757;">NUEVA CARRERA</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // Firebase Configuración Integrada
        const firebaseConfig = {
            apiKey: "AIzaSyAlvRSjQ8HMkYLqWdRnz8sHm6H1anXxNUw",
            authDomain: "hipodromo-56215.firebaseapp.com",
            databaseURL: "https://hipodromo-56215-default-rtdb.firebaseio.com",
            projectId: "hipodromo-56215",
            storageBucket: "hipodromo-56215.firebasestorage.app",
            messagingSenderId: "793993929295",
            appId: "1:793993929295:web:febbad383d625d60c3c03a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const COLORES = ['#FF3B30', '#FF9500', '#FFCC00', '#4CD964', '#5AC8FA', '#007AFF', '#5856D6', '#FF2D55', '#E91E63', '#00BCD4'];
        
        let datosEquipos = {};
        let anteriorClicks = {};
        let posiciones = {};
        let juegoActivo = false;
        let clasificacion = []; 
        let photoFinishActivo = false;
        let factorVelocidad = 1;

        function resetDB() {
            set(ref(db, 'estado'), 'espera');
            set(ref(db, 'ganadorAbsoluto'), null); 
            const inicial = {};
            for(let i=1; i<=10; i++) {
                inicial[i] = { clicksTotales: 0 }; 
                posiciones[i] = 0; anteriorClicks[i] = 0;
            }
            set(ref(db, 'equipos'), inicial);
        }
        resetDB();

        onValue(ref(db, 'equipos'), (snapshot) => {
            datosEquipos = snapshot.val() || {};
            for(let i=1; i<=10; i++) {
                const data = datosEquipos[i];
                if(data && data.jugadores) {
                    const arrayNombres = Object.values(data.jugadores);
                    document.getElementById(`cnt-${i}`).innerText = arrayNombres.length;
                    document.getElementById(`nom-${i}`).innerText = arrayNombres.join(', ');
                } else {
                    document.getElementById(`cnt-${i}`).innerText = '0';
                    document.getElementById(`nom-${i}`).innerText = '';
                }
            }
        });

        const pista = document.getElementById('pista');
        for(let i=1; i<=10; i++) {
            const carril = document.createElement('div');
            carril.className = 'carril';
            carril.innerHTML = `
                <div class="info">
                    <div class="titulo-eq" style="color: ${COLORES[i-1]}">EQ ${i} | <span id="cnt-${i}">0</span> jg.</div>
                    <div class="nombres-jugadores" id="nom-${i}"></div>
                </div>
                <div class="caballo" id="c-${i}" style="filter: drop-shadow(0 0 15px ${COLORES[i-1]});">🐎</div>
            `;
            pista.appendChild(carril);
        }

        window.iniciarCarrera = () => {
            document.getElementById('overlay-inicio').style.display = 'none';
            set(ref(db, 'estado'), 'carrera'); 
            juegoActivo = true;
        };

        setInterval(() => {
            if(!juegoActivo) return;

            let equiposActivos = 0;

            for(let i=1; i<=10; i++) {
                const data = datosEquipos[i];
                const cantidadJugadores = (data && data.jugadores) ? Object.keys(data.jugadores).length : 0;

                if(cantidadJugadores > 0) {
                    equiposActivos++;
                    
                    if(!clasificacion.includes(i)) {
                        const nuevosClicks = data.clicksTotales - anteriorClicks[i];
                        
                        const avance = (nuevosClicks / cantidadJugadores) * 5 * factorVelocidad; 
                        
                        posiciones[i] += avance;
                        anteriorClicks[i] = data.clicksTotales;

                        const el = document.getElementById(`c-${i}`);
                        const porcentaje = Math.min((posiciones[i] / 1000) * 90, 95);
                        el.style.left = porcentaje + "vw";

                        if(posiciones[i] >= 1000 && !photoFinishActivo) {
                            ejecutarPhotoFinish(i, equiposActivos);
                        }
                    }
                }
            }
        }, 100);

        function ejecutarPhotoFinish(idCaballo, totalEquiposActivos) {
            photoFinishActivo = true;
            factorVelocidad = 0.05;

            const origenY = (idCaballo * 10) - 5; 
            pista.style.transformOrigin = `right ${origenY}vh`;
            pista.style.transform = `scale(3) translateX(-5vw)`; 
            document.body.classList.add('efecto-tension');

            setTimeout(() => {
                clasificacion.push(idCaballo);
                document.getElementById(`c-${idCaballo}`).innerText = "🏁";

                if (clasificacion.length === 1) {
                    set(ref(db, 'ganadorAbsoluto'), idCaballo);
                }

                pista.style.transform = `scale(1) translateX(0)`;
                document.body.classList.remove('efecto-tension');
                factorVelocidad = 1;
                photoFinishActivo = false;

                const limitePodio = Math.min(3, totalEquiposActivos);
                if (clasificacion.length >= limitePodio) {
                    juegoActivo = false;
                    set(ref(db, 'estado'), 'espera');
                    mostrarPodioEpic();
                }
            }, 2000); 
        }

        function mostrarPodioEpic() {
            setTimeout(() => {
                const podioDiv = document.getElementById('overlay-podio');
                const lista = document.getElementById('lista-podio');
                podioDiv.style.display = 'flex';

                const medallas = ['oro', 'plata', 'bronce'];
                const nombres = ['1ER LUGAR', '2DO LUGAR', '3ER LUGAR'];

                clasificacion.forEach((equipoId, index) => {
                    if(index < 3) {
                        const item = document.createElement('div');
                        item.className = `puesto ${medallas[index]}`;
                        
                        const nombresGanadores = Object.values(datosEquipos[equipoId].jugadores).join(', ');
                        item.innerHTML = `
                            <span>${nombres[index]}</span> 
                            <span style="text-align: right;">EQ ${equipoId}<br><span style="font-size: 2vh; color: #fff;">${nombresGanadores}</span></span>
                        `;
                        lista.appendChild(item);
                    }
                });
            }, 500); 
        }
    </script>
</body>
</html>
