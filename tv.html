<!DOCTYPE html>
<html lang="es">
<head>
    <title>Santander TV Carrera</title>
    <style>
        :root { --neon-red: #EC0000; --dark-bg: #050505; }
        body { background: var(--dark-bg); color: #fff; font-family: 'Arial Black', sans-serif; margin: 0; overflow: hidden; transition: filter 1s ease-out; }
        
        /* Fondo con pista.png */
        #pista-container { width: 100vw; height: 100vh; position: relative; background: url('pista.png') center center / cover no-repeat; transition: transform 0.8s cubic-bezier(0.25, 0.1, 0.25, 1); will-change: transform; }
        
        /* Contenedor central (60% de la altura) para aislar las bicis del público */
        #zona-carriles { position: absolute; top: 20vh; left: 0; width: 100vw; height: 60vh; display: flex; flex-direction: column; }
        .carril { flex: 1; border-bottom: 2px dashed rgba(236, 0, 0, 0.2); position: relative; display: flex; align-items: center; }
        
        .bicicleta { position: absolute; left: 0; font-size: 12vh; transition: left 0.1s linear; z-index: 2; filter: drop-shadow(0 0 15px var(--neon-red)); transform: scaleX(-1); }
        .info { position: absolute; left: 20px; z-index: 10; font-size: 4vh; text-transform: uppercase; color: #fff; text-shadow: 0 0 10px var(--neon-red), 2px 2px 0 #000; letter-spacing: 2px; }
        
        /* Línea de meta Láser Neón en el 90vw */
        .meta { position: absolute; left: 90vw; top: 0; bottom: 0; width: 4px; background: #fff; box-shadow: 0 0 20px var(--neon-red), 0 0 40px var(--neon-red); z-index: 0; }

        .efecto-tension { filter: saturate(1.5) contrast(1.2) brightness(0.8); }

        .overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(5, 5, 5, 0.9); display:none; flex-direction:column; justify-content:center; align-items:center; z-index:100; text-align: center; backdrop-filter: blur(5px); }
        #titulo-inicio { font-size: 10vh; margin:0; color: #fff; text-shadow: 0 0 20px var(--neon-red); text-transform: uppercase; letter-spacing: 5px; }
        
        .btn-iniciar { padding: 20px 60px; font-size: 3vh; background: transparent; color: #fff; border: 3px solid var(--neon-red); cursor: pointer; font-weight: bold; margin-top: 40px; text-transform: uppercase; box-shadow: inset 0 0 15px rgba(236,0,0,0.5), 0 0 20px rgba(236,0,0,0.5); font-family: 'Arial Black'; letter-spacing: 2px; transition: background 0.3s; }
        .btn-iniciar:hover { background: var(--neon-red); }
        
        #contador-tv { font-size: 35vh; font-weight: bold; color: #fff; text-shadow: 0 0 50px var(--neon-red); display: none; animation: latido 1s infinite; line-height: 1; }
        @keyframes latido { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        .puesto { font-size: 4vh; margin: 10px; padding: 15px 40px; background: rgba(236,0,0,0.1); border: 2px solid var(--neon-red); width: 60%; display: flex; justify-content: space-between; color: white; text-transform: uppercase; align-items: center; box-shadow: 0 0 15px rgba(236,0,0,0.3); }
    </style>
</head>
<body>
    <div id="pista-container">
        <div id="zona-carriles">
            <div class="meta"></div>
        </div>
    </div>

    <div id="overlay-inicio" class="overlay" style="display: flex;">
        <h1 id="titulo-inicio">BIKE CHALLENGE</h1>
        <button id="btn-arrancar" class="btn-iniciar" onclick="iniciarSecuencia()">INICIAR CARRERA</button>
        <div id="contador-tv">3</div>
    </div>

    <div id="overlay-podio" class="overlay">
        <h1 style="font-size: 8vh; color: #fff; text-shadow: 0 0 20px var(--neon-red);">RESULTADOS</h1>
        <div id="lista-podio" style="width: 100%; display: flex; flex-direction: column; align-items: center;"></div>
        <button class="btn-iniciar" onclick="location.reload()">NUEVA CARRERA</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAlvRSjQ8HMkYLqWdRnz8sHm6H1anXxNUw",
            authDomain: "hipodromo-56215.firebaseapp.com",
            databaseURL: "https://hipodromo-56215-default-rtdb.firebaseio.com",
            projectId: "hipodromo-56215",
            storageBucket: "hipodromo-56215.firebasestorage.app",
            messagingSenderId: "793993929295",
            appId: "1:793993929295:web:febbad383d625d60c3c03a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const EQUIPOS = ["DELIVER", "DEVELOP", "TRANSFORM"];
        let datosEq = {}, anteriorClicks = {}, posiciones = {};
        let juegoActivo = false, clasificacion = [];
        let factorVel = 1, enTension = false;

        const LIMITE_IZQUIERDO_META = 90; 

        function resetDB() {
            set(ref(db, 'estado'), 'espera');
            set(ref(db, 'ganadorAbsoluto'), null); 
            const inicial = {};
            EQUIPOS.forEach((_, i) => { inicial[i+1] = { clicksTotales: 0 }; posiciones[i+1] = 0; anteriorClicks[i+1] = 0; });
            set(ref(db, 'equipos'), inicial);
        }
        resetDB();

        onValue(ref(db, 'equipos'), (snap) => { datosEq = snap.val() || {}; });

        const zonaCarriles = document.getElementById('zona-carriles');
        EQUIPOS.forEach((nombre, i) => {
            const carril = document.createElement('div');
            carril.className = 'carril';
            carril.innerHTML = `
                <div class="info">${nombre}</div>
                <div class="bicicleta" id="b-${i+1}">🚴</div>
            `;
            zonaCarriles.appendChild(carril);
        });

        window.iniciarSecuencia = () => {
            document.getElementById('titulo-inicio').style.display = 'none';
            document.getElementById('btn-arrancar').style.display = 'none';
            const tv = document.getElementById('contador-tv'); tv.style.display = 'block';
            set(ref(db, 'estado'), 'cuenta_regresiva');
            
            let num = 3; tv.innerText = num;
            const int = setInterval(() => {
                num--; if(num>0) tv.innerText = num;
                else { clearInterval(int); tv.innerText = "GO!"; setTimeout(() => { 
                    document.getElementById('overlay-inicio').style.display = 'none';
                    set(ref(db, 'estado'), 'carrera'); juegoActivo = true; 
                }, 500); }
            }, 1000);
        };

        setInterval(() => {
            if(!juegoActivo) return;

            let equiposActivos = 0;
            let equiposEnZonaTension = []; // Array para Multi-Focus

            EQUIPOS.forEach((_, i) => {
                const id = i + 1;
                const data = datosEq[id];
                const jgs = data && data.jugadores ? Object.keys(data.jugadores).length : 0;

                if(jgs > 0 && !clasificacion.includes(id)) {
                    equiposActivos++;
                    
                    const nuevosClicks = data.clicksTotales - anteriorClicks[id];
                    const avance = (nuevosClicks / jgs) * 5 * factorVel; 
                    
                    posiciones[id] += avance;
                    anteriorClicks[id] = data.clicksTotales;

                    const visualLeft = (posiciones[id] / 1000) * LIMITE_IZQUIERDO_META;
                    const el = document.getElementById(`b-${id}`);
                    el.style.left = Math.min(visualLeft, 92) + "vw";

                    // Registrar bicicletas en la zona crítica (Punto 930)
                    if (posiciones[id] >= 930 && posiciones[id] < 1000) {
                        equiposEnZonaTension.push(id);
                    }

                    if (posiciones[id] >= 1000) {
                        clasificacion.push(id);
                        el.style.transform = "scaleX(1)"; 
                        el.innerText = "🚩";
                        el.style.filter = "drop-shadow(0 0 20px #fff)"; // Brillo blanco al ganar

                        if (clasificacion.length === 1) set(ref(db, 'ganadorAbsoluto'), id);

                        if (clasificacion.length >= Math.min(3, equiposActivos)) {
                            juegoActivo = false;
                            setTimeout(() => { 
                                document.getElementById('pista-container').style.transform = `scale(1) translateX(0)`;
                                document.body.classList.remove('efecto-tension');
                                set(ref(db, 'estado'), 'espera'); 
                                mostrarPodioEpic(); 
                            }, 1500);
                        }
                    }
                }
            });

            // LÓGICA DE MULTI-FOCUS ZOOM
            const contenedor = document.getElementById('pista-container');
            
            if (equiposEnZonaTension.length > 0 && !enTension && clasificacion.length === 0) {
                enTension = true;
                factorVel = 0.3;
                document.body.classList.add('efecto-tension');
                
                if (equiposEnZonaTension.length === 1) {
                    // Solo 1 bici: Zoom extremo hacia ella
                    const idLider = equiposEnZonaTension[0];
                    const origenY = 20 + ((idLider - 1) * 20) + 10; // (20vh margen superior + carril + centro)
                    contenedor.style.transformOrigin = `90vw ${origenY}vh`; 
                    contenedor.style.transform = `scale(3.5) translateX(-2vw)`; 
                } else {
                    // Más de 1 bici peleando: Zoom intermedio centrado en la pista
                    contenedor.style.transformOrigin = `85vw 50vh`; // Centro vertical de la pantalla
                    contenedor.style.transform = `scale(2) translateX(-5vw)`; 
                }
            } else if (equiposEnZonaTension.length === 0 && clasificacion.length > 0 && enTension) {
                 // Si alguien cruzó y nadie más está en tensión, soltamos la cámara
                 contenedor.style.transform = `scale(1) translateX(0)`;
                 document.body.classList.remove('efecto-tension');
                 factorVel = 1;
                 enTension = false;
            }
        }, 100);

        function mostrarPodioEpic() {
            const podioDiv = document.getElementById('overlay-podio');
            const lista = document.getElementById('lista-podio');
            podioDiv.style.display = 'flex';

            clasificacion.forEach((id, idx) => {
                if(idx < 3) {
                    const item = document.createElement('div');
                    item.className = 'puesto';
                    item.innerHTML = `<span style="color: #fff; text-shadow: 0 0 10px var(--neon-red);">#${idx+1}</span> <span>${EQUIPOS[id-1]}</span>`;
                    lista.appendChild(item);
                }
            });
        }
    </script>
</body>
</html>
