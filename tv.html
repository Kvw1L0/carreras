<!DOCTYPE html>
<html lang="es">
<head>
    <title>Jungle TV Carrera</title>
    <style>
        :root { --jungle-yellow: #FFE600; --jungle-black: #111111; }
        body { background: var(--jungle-black); color: var(--jungle-yellow); font-family: 'Arial Black', sans-serif; margin: 0; overflow: hidden; transition: filter 1s ease-out; }
        
        #pista { width: 100vw; height: 100vh; position: relative; background: #1a1a1a; transition: transform 0.8s cubic-bezier(0.25, 0.1, 0.25, 1); will-change: transform; border-top: 5px solid var(--jungle-yellow); border-bottom: 5px solid var(--jungle-yellow); box-sizing: border-box; }
        
        .carril { height: 33vh; border-bottom: 4px dashed rgba(255, 230, 0, 0.2); position: relative; display: flex; align-items: center; }
        
        /* La bicicleta mira hacia la meta */
        .bicicleta { position: absolute; left: 0; font-size: 15vh; transition: left 0.1s linear; z-index: 2; filter: drop-shadow(0 0 10px #FF3B30); transform: scaleX(-1); }
        
        .info { position: absolute; left: 20px; z-index: 10; font-size: 5vh; text-transform: uppercase; color: var(--jungle-yellow); text-shadow: 4px 4px 0 #000; }
        
        /* La meta empieza en el 95vw de la pantalla */
        .meta { position: absolute; left: 95vw; top: 0; bottom: 0; width: 40px; background: repeating-linear-gradient(0deg, var(--jungle-black), var(--jungle-black) 20px, var(--jungle-yellow) 20px, var(--jungle-yellow) 40px); z-index: 0; border-left: 5px solid #fff; }

        .efecto-tension { filter: saturate(2) contrast(1.5) brightness(0.6); }

        .overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); display:none; flex-direction:column; justify-content:center; align-items:center; z-index:100; text-align: center; }
        #titulo-inicio { font-size: 12vh; margin:0; color: var(--jungle-yellow); text-shadow: 5px 5px 0px #000; text-transform: uppercase; }
        .btn-iniciar { padding: 20px 60px; font-size: 4vh; background: var(--jungle-yellow); color: var(--jungle-black); border: none; cursor: pointer; font-weight: bold; margin-top: 40px; text-transform: uppercase; box-shadow: 6px 6px 0px #fff; font-family: 'Arial Black'; }
        
        #contador-tv { font-size: 35vh; font-weight: bold; color: var(--jungle-yellow); text-shadow: 10px 10px 0px #000; display: none; animation: latido 1s infinite; line-height: 1; }
        @keyframes latido { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        .puesto { font-size: 4vh; margin: 10px; padding: 15px 40px; background: var(--jungle-black); border: 4px solid var(--jungle-yellow); width: 60%; display: flex; justify-content: space-between; color: white; text-transform: uppercase; align-items: center; }
    </style>
</head>
<body>
    <div id="pista">
        <div class="meta"></div>
    </div>

    <div id="overlay-inicio" class="overlay" style="display: flex;">
        <h1 id="titulo-inicio">BIKE CHALLENGE</h1>
        <button id="btn-arrancar" class="btn-iniciar" onclick="iniciarSecuencia()">EMPEZAR</button>
        <div id="contador-tv">3</div>
    </div>

    <div id="overlay-podio" class="overlay">
        <h1 style="font-size: 9vh; color: var(--jungle-yellow); text-shadow: 5px 5px 0px #000;">RESULTADOS</h1>
        <div id="lista-podio" style="width: 100%; display: flex; flex-direction: column; align-items: center;"></div>
        <button class="btn-iniciar" onclick="location.reload()" style="background: #fff; box-shadow: 6px 6px 0px var(--jungle-yellow);">NUEVA CARRERA</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAlvRSjQ8HMkYLqWdRnz8sHm6H1anXxNUw",
            authDomain: "hipodromo-56215.firebaseapp.com",
            databaseURL: "https://hipodromo-56215-default-rtdb.firebaseio.com",
            projectId: "hipodromo-56215",
            storageBucket: "hipodromo-56215.firebasestorage.app",
            messagingSenderId: "793993929295",
            appId: "1:793993929295:web:febbad383d625d60c3c03a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const EQUIPOS = ["DELIVER", "DEVELOP", "TRANSFORM"];
        let datosEq = {}, anteriorClicks = {}, posiciones = {}, juegoActivo = false, clasificacion = [];
        let factorVel = 1, enTension = false, biciEnFoco = null;

        // 1000 puntos = La rueda toca la línea de meta.
        // La meta empieza en el 95vw. Calculamos para que visualmente bese la línea (85vw aprox del css left).
        const LIMITE_IZQUIERDO_META = 85; 

        function resetDB() {
            set(ref(db, 'estado'), 'espera');
            set(ref(db, 'ganadorAbsoluto'), null); 
            const inicial = {};
            EQUIPOS.forEach((_, i) => { inicial[i+1] = { clicksTotales: 0 }; posiciones[i+1] = 0; anteriorClicks[i+1] = 0; });
            set(ref(db, 'equipos'), inicial);
        }
        resetDB();

        onValue(ref(db, 'equipos'), (snap) => { datosEq = snap.val() || {}; });

        const pista = document.getElementById('pista');
        EQUIPOS.forEach((nombre, i) => {
            const carril = document.createElement('div');
            carril.className = 'carril';
            carril.innerHTML = `
                <div class="info">${nombre}</div>
                <div class="bicicleta" id="b-${i+1}">🚴</div>
            `;
            pista.appendChild(carril);
        });

        window.iniciarSecuencia = () => {
            document.getElementById('titulo-inicio').style.display = 'none';
            document.getElementById('btn-arrancar').style.display = 'none';
            const tv = document.getElementById('contador-tv'); tv.style.display = 'block';
            set(ref(db, 'estado'), 'cuenta_regresiva');
            
            let num = 3; tv.innerText = num;
            const int = setInterval(() => {
                num--; if(num>0) tv.innerText = num;
                else { clearInterval(int); tv.innerText = "¡GO!"; setTimeout(() => { 
                    document.getElementById('overlay-inicio').style.display = 'none';
                    set(ref(db, 'estado'), 'carrera'); juegoActivo = true; 
                }, 500); }
            }, 1000);
        };

        setInterval(() => {
            if(!juegoActivo) return;

            let equiposActivos = 0;

            EQUIPOS.forEach((_, i) => {
                const id = i + 1;
                const data = datosEq[id];
                const jgs = data && data.jugadores ? Object.keys(data.jugadores).length : 0;

                if(jgs > 0 && !clasificacion.includes(id)) {
                    equiposActivos++;
                    
                    const nuevosClicks = data.clicksTotales - anteriorClicks[id];
                    const avance = (nuevosClicks / jgs) * 5 * factorVel; 
                    
                    posiciones[id] += avance;
                    anteriorClicks[id] = data.clicksTotales;

                    // Mapeo: 1000 puntos = Toque exacto de rueda
                    const visualLeft = (posiciones[id] / 1000) * LIMITE_IZQUIERDO_META;
                    const el = document.getElementById(`b-${id}`);
                    el.style.left = Math.min(visualLeft, LIMITE_IZQUIERDO_META) + "vw";

                    // CONDICIÓN DE TENSIÓN CORREGIDA: 
                    // Inicia al 940 (mucho más cerca de la meta) y baja la velocidad al 30% en vez del 10%
                    if (posiciones[id] >= 940 && posiciones[id] < 1000 && !enTension) {
                        enTension = true;
                        biciEnFoco = id;
                        factorVel = 0.3; // Tensión equilibrada, jugable pero dramática

                        const origenY = (id * 33) - 16; 
                        pista.style.transformOrigin = `95vw ${origenY}vh`; 
                        pista.style.transform = `scale(3.5) translateX(-5vw)`; 
                        document.body.classList.add('efecto-tension');
                    }

                    // CONDICIÓN VICTORIA: Llega a los 1000 (Rueda delantera toca la línea)
                    if (posiciones[id] >= 1000) {
                        clasificacion.push(id);
                        el.style.transform = "scaleX(1)"; 
                        el.innerText = "🚩";

                        if (clasificacion.length === 1) set(ref(db, 'ganadorAbsoluto'), id);

                        if (biciEnFoco === id) {
                            setTimeout(() => {
                                pista.style.transform = `scale(1) translateX(0)`;
                                document.body.classList.remove('efecto-tension');
                                factorVel = 1;
                                enTension = false;
                                biciEnFoco = null;

                                if (clasificacion.length >= Math.min(3, equiposActivos)) {
                                    juegoActivo = false;
                                    setTimeout(() => { set(ref(db, 'estado'), 'espera'); mostrarPodioEpic(); }, 1000);
                                }
                            }, 1500);
                        }
                    }
                }
            });
        }, 100);

        function mostrarPodioEpic() {
            const podioDiv = document.getElementById('overlay-podio');
            const lista = document.getElementById('lista-podio');
            podioDiv.style.display = 'flex';

            clasificacion.forEach((id, idx) => {
                if(idx < 3) {
                    const item = document.createElement('div');
                    item.className = 'puesto';
                    item.innerHTML = `<span style="color: gold;">#${idx+1}</span> <span>${EQUIPOS[id-1]}</span>`;
                    lista.appendChild(item);
                }
            });
        }
    </script>
</body>
</html>
